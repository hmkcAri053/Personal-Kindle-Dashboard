<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kindle Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <main class="dashboard" aria-label="Two-column grayscale student dashboard">
    <section class="panel today-panel">
      <header class="panel-header">
        <h1>Today</h1>
        <span class="header-meta" id="weekday">Sat</span>
      </header>

      <section class="date-meta-row">
        <div class="date-card">
          <div class="month" id="month">FEB</div>
          <div class="day" id="day">21</div>
        </div>

        <div class="meta-stack">
          <div class="meta-line">
            <span id="weather-icon" class="weather-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M11.6667 12.6667H6.00001C5.13458 12.6664 4.28627 12.4256 3.54986 11.971C2.81345 11.5164 2.21795 10.866 1.82992 10.0924C1.44189 9.31885 1.2766 8.45263 1.35253 7.59054C1.42847 6.72846 1.74262 5.90447 2.2599 5.21065C2.77718 4.51683 3.4772 3.98052 4.28174 3.66165C5.08628 3.34278 5.96363 3.25391 6.81577 3.40497C7.66791 3.55603 8.46126 3.94107 9.10716 4.51707C9.75306 5.09306 10.2261 5.83731 10.4733 6.66666H11.6667C12.4623 6.66666 13.2254 6.98273 13.788 7.54534C14.3506 8.10795 14.6667 8.87101 14.6667 9.66666C14.6667 10.4623 14.3506 11.2254 13.788 11.788C13.2254 12.3506 12.4623 12.6667 11.6667 12.6667Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
            <span id="weather-text">Cloudy · 3°C / 8°C</span>
          </div>
          <div class="meta-line">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="5" width="16" height="15" rx="2" />
              <path d="M8 3v4M16 3v4M4 10h16" />
            </svg>
            <span id="semester-text">Week 8 · 2026 Spring</span>
          </div>
        </div>
      </section>

      <div class="divider"></div>

      <section class="up-next">
        <header class="section-heading">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="9" />
            <path d="M12 7v5l3 2" />
          </svg>
          <span>UP NEXT</span>
        </header>

        <article class="up-next-card" id="up-next-card">
          <h2 id="up-next-title">No pending tasks</h2>
          <div class="up-next-meta">
            <span class="course" id="up-next-course">-</span>
            <span class="due-wrap">
              <span class="due-date" id="up-next-date">-</span>
              <span class="due-left" id="up-next-left">-</span>
            </span>
          </div>
        </article>
      </section>

      <div class="divider"></div>

      <section class="time-blocks">
        <article class="time-block" id="block-AM" data-slot="AM">
          <div class="time-label">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2v2M4.9 6.9l1.4 1.4M2 12h2M18 18h-8M7 21h10M22 12h-2M19.1 6.9l-1.4 1.4" />
            </svg>
            <span>AM</span>
          </div>
          <div class="time-separator"></div>
          <div class="time-content">
            <div class="time-main-row">
              <h3 id="slot-AM-title">No task</h3>
              <span class="time-due" id="slot-AM-due">-</span>
            </div>
            <div class="time-course" id="slot-AM-course">-</div>
          </div>
        </article>

        <article class="time-block" id="block-PM" data-slot="PM">
          <div class="time-label">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4" />
            </svg>
            <span>PM</span>
          </div>
          <div class="time-separator"></div>
          <div class="time-content">
            <div class="time-main-row">
              <h3 id="slot-PM-title">No task</h3>
              <span class="time-due" id="slot-PM-due">-</span>
            </div>
            <div class="time-course" id="slot-PM-course">-</div>
          </div>
        </article>

        <article class="time-block" id="block-EVE" data-slot="EVE">
          <div class="time-label">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 14h18M7 14a5 5 0 0 1 10 0M12 2v3M4.9 6.8l1.4 1.4M19.1 6.8l-1.4 1.4" />
            </svg>
            <span>EVE</span>
          </div>
          <div class="time-separator"></div>
          <div class="time-content">
            <div class="time-main-row">
              <h3 id="slot-EVE-title">No task</h3>
              <span class="time-due" id="slot-EVE-due">-</span>
            </div>
            <div class="time-course" id="slot-EVE-course">-</div>
          </div>
        </article>

        <article class="time-block" id="block-NIT" data-slot="NIT">
          <div class="time-label">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 14a6 6 0 1 1-6-10 6 6 0 0 0 6 10z" />
            </svg>
            <span>NIT</span>
          </div>
          <div class="time-separator"></div>
          <div class="time-content">
            <div class="time-main-row">
              <h3 id="slot-NIT-title">No task</h3>
              <span class="time-due" id="slot-NIT-due">-</span>
            </div>
            <div class="time-course" id="slot-NIT-course">-</div>
          </div>
        </article>
      </section>

      <footer class="refresh">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 12a8 8 0 1 1-2.3-5.7M20 4v6h-6" />
        </svg>
        <span id="refresh-time">Last refresh --:--</span>
      </footer>
    </section>

    <section class="panel task-panel">
      <header class="panel-header task-header">
        <h1>Tasks</h1>
        <div class="task-header-meta">
          <span id="pending-count">0 pending</span>
          <span class="urgent">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9" />
              <path d="M12 8v5M12 16h.01" />
            </svg>
            <span id="urgent-count">0 urgent</span>
          </span>
        </div>
      </header>

      <section class="progress">
        <div class="progress-bar">
          <span id="progress-fill"></span>
        </div>
        <div class="progress-meta">
          <span>Progress</span>
          <span id="progress-text">0/0</span>
        </div>
      </section>

      <section class="task-list" id="pending-task-list"></section>

      <footer class="completed-divider">
        <span>COMPLETED</span>
      </footer>

      <section class="task-list task-list-completed" id="completed-task-list"></section>
    </section>
  </main>
</body>
</html>
